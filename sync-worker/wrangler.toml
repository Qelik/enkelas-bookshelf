name = "enkelas-bookshelf-sync"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# KV namespace for users + per-user data.
# The `id`/`preview_id` below are placeholders for local `wrangler dev`.
# Before the first real deploy, run:
#   npx wrangler kv namespace create BOOKSHELF
#   npx wrangler kv namespace create BOOKSHELF --preview
# and paste the returned ids here.
[[kv_namespaces]]
binding = "BOOKSHELF"
id = "cdeead88aa7d42579a16de9aa549fc14"
preview_id = "0f3b29b9ed2a4c6a9cbecf659eda13cc"

# D1 database for Reading Clubs (spoiler-safe book clubs).
# Before the first real deploy, provision it and apply the schema:
#   cd sync-worker
#   npx wrangler d1 create enkelas-clubs          # paste the returned database_id below AND into ../wrangler.jsonc
#   npx wrangler d1 execute enkelas-clubs --remote --file schema-clubs.sql
# The placeholder id is fine for local `wrangler dev --local`.
[[d1_databases]]
binding = "CLUBS_DB"
database_name = "enkelas-clubs"
database_id = "0f1ac91e-6b3e-4a5f-a929-890cebb86d81"
